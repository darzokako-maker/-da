name: SonOyuncu Canlı Deobfuscator Pipeline

on:
  workflow_dispatch:

jobs:
  build_and_analyze:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Java JDK 17 Kur
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Calisma Klasorlerini Olustur
      run: |
        mkdir -p workspace/input
        mkdir -p workspace/output
        mkdir -p workspace/output/sources
        cp SonOyuncuClient.jar workspace/input/SonOyuncuClient.jar

    - name: Analiz Aracini Derle (Build)
      run: mvn clean package

    - name: Sifreleri ve Kodlari Coz (Deobfuscate)
      run: |
        java -jar target/GucluDeobfuscator-1.0-SNAPSHOT-jar-with-dependencies.jar workspace/input/SonOyuncuClient.jar workspace/output/DeobfuscatedClient.jar

    - name: Kodu Okunabilir Java'ya Cevir (Decompile)
      run: |
        # Decompiler aracını indiriyoruz
        wget https://github.com/Vineflower/vineflower/releases/download/1.10.1/vineflower-1.10.1.jar -O decompiler.jar
        
        # ARTIK ÇALIŞTIRIYORUZ: Şifresi çözülmüş JAR dosyasını saf Java kodlarına dönüştürüp sources klasörüne çıkartır
        java -jar decompiler.jar workspace/output/DeobfuscatedClient.jar workspace/output/sources/

    - name: Temiz Kodlari Yukle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Temiz-SonOyuncu-Kaynak-Kodlari
        # Tüm output klasörünü alıyoruz (İçinde hem DeobfuscatedClient.jar hem de kaynak kodları olacak)
        path: workspace/output/
        retention-days: 3
        
